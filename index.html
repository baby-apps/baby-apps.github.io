<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Baby Drawing</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:light;
  --page-bg:#eef2ff;
  --panel-bg:#f8f9ff;
  --soft-bg:#eef0ff;
  --button-bg:#f4f5fb;
  --canvas-bg:#f7f8ff;
  --border:#e2e5f5;
  --border-strong:#c5caff;
  --accent:#5c63d8;
  --accent-strong:#7c83e8;
  --text:#45485b;
  --muted:#9298ad;
  --overlay:rgba(42,45,75,0.48);
  --hint-overlay:rgba(30,30,60,0.55);
  --toast-bg:rgba(248,249,255,0.92);
  --danger:#e53935;
  --danger-bg:#ffe9ee;
  --danger-border:#ffc7d2;
  --shadow:0 4px 24px rgba(92,99,216,0.18);
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --page-bg:#171924;
  --panel-bg:#222534;
  --soft-bg:#2c3150;
  --button-bg:#282b3a;
  --canvas-bg:#1d2030;
  --border:#34384d;
  --border-strong:#5960a8;
  --accent:#a8adff;
  --accent-strong:#878dff;
  --text:#e3e6f4;
  --muted:#9aa1bd;
  --overlay:rgba(8,10,18,0.62);
  --hint-overlay:rgba(8,10,18,0.68);
  --toast-bg:rgba(34,37,52,0.92);
  --danger:#ff7b7b;
  --danger-bg:#40242c;
  --danger-border:#6a3543;
  --shadow:0 4px 24px rgba(0,0,0,0.28);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html{width:100%;height:100%;height:100dvh;overflow:hidden;}
body{background:var(--page-bg);font-family:'Nunito',sans-serif;overflow:hidden;width:100vw;height:100%;min-height:100dvh;display:flex;flex-direction:column;color:var(--text);}

/* ── TOP BAR ── */
#topbar{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;padding-top:max(8px,env(safe-area-inset-top));background:var(--panel-bg);
  border-bottom:2px solid var(--border);flex-shrink:0;
  min-height:54px;
}
#picker-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:20px;
  border:2px solid var(--accent-strong);background:var(--soft-bg);
  font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:var(--accent);
  cursor:pointer;white-space:nowrap;flex:0 0 auto;min-width:136px;max-width:min(46vw,230px);
  touch-action:manipulation;
}
#picker-btn span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-btn{
  width:40px;height:40px;border-radius:12px;
  border:2px solid var(--border);background:var(--button-bg);
  font-size:20px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;color:var(--text);transition:transform 0.1s;
}
.nav-btn:active{transform:scale(0.9);background:var(--soft-bg);}
.nav-btn:disabled{opacity:0.3;pointer-events:none;}
#tpl-label{font-family:'Fredoka One',cursive;font-size:15px;color:var(--accent);min-width:52px;text-align:center;flex-shrink:0;}
#fullscreenBtn{margin-left:auto;}
#settingsBtn{margin-left:0;}

/* ── CANVAS ── */
#canvas-area{flex:1 1 auto;min-height:0;position:relative;overflow:hidden;touch-action:none;}
#template-canvas,#draw-canvas{position:absolute;top:0;left:0;}
#template-canvas{pointer-events:none;}
#draw-canvas{cursor:crosshair;touch-action:none;}

/* ── HINT THUMBNAIL ── */
#hint-thumb{
  position:absolute;top:10px;right:10px;
  width:72px;height:72px;border-radius:14px;
  background:var(--panel-bg);border:2px solid var(--border-strong);
  overflow:hidden;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.15s;z-index:10;
}
#hint-thumb:active{transform:scale(0.93);}
#hint-thumb canvas{width:100%;height:100%;}
#hint-label{position:absolute;bottom:0;left:0;right:0;background:rgba(92,99,216,0.82);color:#f4f6ff;font-size:9px;font-weight:800;text-align:center;padding:2px 0;border-radius:0 0 12px 12px;}

/* ── HINT OVERLAY ── */
#hint-overlay{
  position:absolute;inset:0;background:var(--hint-overlay);
  display:flex;align-items:center;justify-content:center;
  z-index:20;opacity:0;pointer-events:none;transition:opacity 0.2s;
}
#hint-overlay.open{opacity:1;pointer-events:all;}
#hint-big{
  width:min(80vw,80vh);height:min(80vw,80vh);
  background:var(--panel-bg);border-radius:20px;border:3px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  transform:scale(0.9);transition:transform 0.2s;
}
#hint-overlay.open #hint-big{transform:scale(1);}
#hint-big canvas{width:100%;height:100%;}
#hint-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:var(--panel-bg);border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);}

/* ── TRACE HINT ── */
#trace-hint{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:var(--toast-bg);border-radius:20px;
  padding:6px 16px;font-size:12px;font-weight:700;color:var(--muted);
  pointer-events:none;transition:opacity 0.5s;white-space:nowrap;
}

/* ── BOTTOM BAR ── */
#bottombar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--panel-bg);
  border-top:2px solid var(--border);flex-shrink:0;
  min-height:64px;gap:8px;flex-wrap:nowrap;
}
@supports(height:100svh){
  html{height:100svh;}
  body{min-height:100svh;}
}
@media(max-width:380px){
  #bottombar{padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom));gap:6px;}
  .action-btn{padding:8px 10px;}
  .brush-btn{width:32px;height:32px;}
  #color-trigger{width:34px;height:34px;}
}
@media(max-width:520px){
  #topbar{gap:6px;padding-left:8px;padding-right:8px;}
  #picker-btn{min-width:118px;max-width:150px;padding-left:8px;padding-right:8px;}
}
@media(min-width:700px){
  body.fullscreen-active #topbar{
    padding-left:max(72px,env(safe-area-inset-left));
  }
  body.fullscreen-active #picker-btn{
    min-width:172px;
    max-width:min(52vw,280px);
  }
}

/* current color dot (opens picker) */
#color-trigger{
  width:38px;height:38px;border-radius:50%;
  border:3px solid var(--text);cursor:pointer;flex-shrink:0;
  transition:transform 0.1s;touch-action:manipulation;
  position:relative;
}
#color-trigger:active{transform:scale(0.9);}

/* brush size row */
.brush-btn{
  width:36px;height:36px;border-radius:10px;
  border:2px solid var(--border);background:var(--button-bg);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform 0.1s;touch-action:manipulation;
}
.brush-btn:active{transform:scale(0.9);}
.brush-btn.active{background:var(--soft-bg);border-color:var(--accent-strong);}
.brush-btn circle{fill:var(--text);}

.action-btn{
  padding:8px 14px;border-radius:14px;
  border:2px solid var(--border);background:var(--button-bg);
  font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;color:var(--text);
  cursor:pointer;flex-shrink:0;white-space:nowrap;
  touch-action:manipulation;transition:transform 0.1s;
}
.action-btn:active{transform:scale(0.93);}
.action-btn.danger{color:var(--danger);border-color:var(--danger-border);}
.action-btn.danger:active{background:var(--danger-bg);}

/* ── COLOR POPUP ── */
#color-popup{
  position:absolute;bottom:calc(74px + env(safe-area-inset-bottom));left:12px;
  background:var(--panel-bg);border-radius:18px;
  border:2px solid var(--border);
  padding:12px;z-index:30;
  display:none;
  box-shadow:var(--shadow);
}
#color-popup.open{display:block;}
#color-grid{display:grid;grid-template-columns:repeat(6,36px);gap:8px;}
.cpick{
  width:36px;height:36px;border-radius:50%;
  border:3px solid transparent;cursor:pointer;
  transition:transform 0.1s;touch-action:manipulation;
}
.cpick:active{transform:scale(0.88);}
.cpick.active{border-color:var(--text);transform:scale(1.15);}
#popup-close-area{position:fixed;inset:0;z-index:29;display:none;}
#popup-close-area.open{display:block;}

/* ── MODAL ── */
#overlay{position:fixed;inset:0;background:var(--overlay);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.2s;}
#overlay.open{opacity:1;pointer-events:all;}
#modal{background:var(--panel-bg);border-radius:24px;width:min(94vw,520px);max-height:82vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(0.94);transition:transform 0.2s;}
#overlay.open #modal{transform:scale(1);}
#modal-header{padding:14px 16px 0;display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
#modal-title{font-family:'Fredoka One',cursive;font-size:18px;color:var(--accent);}
#topic-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.tab-btn{padding:5px 12px;border-radius:16px;border:2px solid var(--border);background:var(--button-bg);font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;color:var(--muted);cursor:pointer;touch-action:manipulation;}
.tab-btn.active{background:var(--soft-bg);border-color:var(--accent-strong);color:var(--accent);}
#modal-grid-wrap{flex:1;overflow-y:auto;padding:12px 16px 16px;}
#modal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:10px;}
.grid-item{aspect-ratio:1;border-radius:14px;border:2px solid var(--border);background:var(--canvas-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;touch-action:manipulation;transition:transform 0.1s;}
.grid-item:active{transform:scale(0.92);}
.grid-item.active{border-color:var(--accent-strong);background:var(--soft-bg);}
.grid-item canvas{pointer-events:none;}
.grid-item-label{font-size:11px;font-weight:800;color:var(--muted);font-family:'Nunito',sans-serif;text-align:center;}

/* ── SETTINGS ── */
#settings-overlay{position:fixed;inset:0;background:var(--overlay);display:flex;align-items:center;justify-content:center;z-index:110;opacity:0;pointer-events:none;transition:opacity 0.2s;}
#settings-overlay.open{opacity:1;pointer-events:all;}
#settings-modal{background:var(--panel-bg);border-radius:24px;width:min(92vw,380px);max-height:82vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(0.94);transition:transform 0.2s;}
#settings-overlay.open #settings-modal{transform:scale(1);}
#settings-header{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--border);flex-shrink:0;}
#settings-title{font-family:'Fredoka One',cursive;font-size:18px;color:var(--accent);}
#settings-body{overflow-y:auto;padding:4px 0 16px;}
.s-section{padding:10px 16px 3px;font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;gap:12px;}
.s-row+.s-row{border-top:1px solid var(--border);}
.s-label{font-size:14px;font-weight:800;color:var(--text);}
.s-desc{font-size:11px;color:var(--muted);margin-top:2px;}
.seg-toggle{display:flex;background:var(--soft-bg);border-radius:20px;padding:3px;gap:3px;}
.seg-btn,.lang-btn{padding:5px 14px;border-radius:16px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:var(--muted);background:transparent;cursor:pointer;transition:all 0.15s;touch-action:manipulation;}
.seg-btn.active,.lang-btn.active{background:var(--panel-bg);color:var(--accent);box-shadow:0 1px 6px rgba(92,99,216,0.18);}
#fillSlider{width:110px;accent-color:var(--accent);cursor:pointer;}
#fillValue{font-size:13px;font-weight:800;color:var(--accent);min-width:38px;text-align:right;}
.s-btn{padding:8px 18px;border-radius:14px;border:2px solid var(--border);background:var(--button-bg);font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:var(--text);cursor:pointer;touch-action:manipulation;transition:transform 0.1s;}
.s-btn:active{transform:scale(0.93);}
.s-btn.accent{background:var(--soft-bg);border-color:var(--accent-strong);color:var(--accent);}
.plan-pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;}
.plan-pill.free{background:var(--soft-bg);color:var(--accent);}
.plan-pill.ban{background:#fff8e1;color:#e65100;}
</style>

<body>

<!-- TOP BAR -->
<div id="topbar">
  <button id="picker-btn"><span id="picker-label">ABC · A</span> ▾</button>
  <button class="nav-btn" id="prevBtn">←</button>
  <span id="tpl-label">A</span>
  <button class="nav-btn" id="nextBtn">→</button>
  <button class="nav-btn" id="fullscreenBtn" title="Full screen">⛶</button>
  <button class="nav-btn" id="settingsBtn" title="Settings">⚙</button>
</div>

<!-- CANVAS -->
<div id="canvas-area">
  <canvas id="template-canvas"></canvas>
  <canvas id="draw-canvas"></canvas>

  <!-- hint thumbnail -->
  <div id="hint-thumb">
    <canvas id="hint-small-canvas" width="68" height="68"></canvas>
    <div id="hint-label">hint</div>
  </div>

  <!-- hint overlay -->
  <div id="hint-overlay">
    <div id="hint-big">
      <canvas id="hint-big-canvas" width="500" height="500"></canvas>
    </div>
    <button id="hint-close">×</button>
  </div>

  <div id="trace-hint">Trace the dots!</div>
</div>

<!-- COLOR POPUP -->
<div id="popup-close-area"></div>
<div id="color-popup">
  <div id="color-grid"></div>
</div>

<!-- BOTTOM BAR -->
<div id="bottombar">
  <div id="color-trigger"></div>

  <button class="brush-btn active" data-size="8"><svg width="14" height="14"><circle cx="7" cy="7" r="4" fill="#555"/></svg></button>
  <button class="brush-btn" data-size="18"><svg width="20" height="20"><circle cx="10" cy="10" r="7" fill="#555"/></svg></button>
  <button class="brush-btn" data-size="30"><svg width="26" height="26"><circle cx="13" cy="13" r="11" fill="#555"/></svg></button>

  <button class="action-btn" id="undoBtn" data-i18n="undo">Undo</button>
  <button class="action-btn danger" id="clearBtn" data-i18n="clear">Clear</button>
</div>

<!-- MODAL -->
<div id="overlay">
  <div id="modal">
    <div id="modal-header">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span id="modal-title">Choose a template</span>
        <button id="modal-close" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;padding:0 4px;">×</button>
      </div>
      <div id="topic-tabs"></div>
    </div>
    <div id="modal-grid-wrap"><div id="modal-grid"></div></div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings-overlay">
  <div id="settings-modal">
    <div id="settings-header">
      <span id="settings-title" data-i18n="settings">Settings</span>
      <button id="settings-close" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;padding:0 4px;">×</button>
    </div>
    <div id="settings-body">

      <div class="s-section" data-i18n="sectionGeneral">General</div>

      <div class="s-row">
        <div class="s-label" data-i18n="language">Language</div>
        <div class="seg-toggle">
          <button class="lang-btn active" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="vi">VI</button>
        </div>
      </div>

      <div class="s-row">
        <div class="s-label" data-i18n="theme">Theme</div>
        <div class="seg-toggle">
          <button class="seg-btn theme-btn active" data-theme="light" data-i18n="light">Light</button>
          <button class="seg-btn theme-btn" data-theme="dark" data-i18n="dark">Dark</button>
        </div>
      </div>

      <div class="s-row">
        <div>
          <div class="s-label" data-i18n="templateSize">Template size</div>
          <div class="s-desc" data-i18n="templateSizeDesc">How large the template appears</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="range" id="fillSlider" min="30" max="90" step="5" value="68">
          <span id="fillValue">68%</span>
        </div>
      </div>

      <div class="s-section" data-i18n="sectionAccount">Account</div>

      <div class="s-row">
        <div>
          <div class="s-label" data-i18n="login">Sign in</div>
          <div class="s-desc" data-i18n="loginDesc">Save progress across devices</div>
        </div>
        <button class="s-btn accent" id="loginBtn" data-i18n="login">Sign in</button>
      </div>

      <div class="s-section" data-i18n="sectionAbout">About</div>

      <div class="s-row">
        <div>
          <div class="s-label">Baby Drawing</div>
          <div class="s-desc">v1.0</div>
        </div>
        <span class="plan-pill free" id="planPill">Free</span>
      </div>

      <div class="s-row" style="border-top:1px solid #f2f3ff;">
        <div class="s-desc" data-i18n="upgradeDesc">Unlock all templates and themes</div>
        <button class="s-btn accent" data-i18n="upgrade">Upgrade</button>
      </div>

    </div>
  </div>
</div>

const DOT_R=5, DOT_COLOR='#9199b0', DOT_SPACING=18;
const root=document.documentElement;

function cssVar(name){
  return getComputedStyle(root).getPropertyValue(name).trim();
}

function samplePolyline(pts,spacing){
  const dots=[];let carry=0;
  for(let i=0;i<pts.length-1;i++){
    const ax=pts[i][0],ay=pts[i][1],bx=pts[i+1][0],by=pts[i+1][1];
    const dx=bx-ax,dy=by-ay,seg=Math.hypot(dx,dy);
    if(seg<0.001)continue;
    let t=(carry>0)?(spacing-carry)/seg:0;
    if(carry===0)dots.push([ax,ay]);
    while(t<=1){dots.push([ax+dx*t,ay+dy*t]);t+=spacing/seg;}
    carry=seg-(t-spacing/seg)*seg;
    if(carry>=seg)carry=0;
  }
  return dots;
}

function drawDots(ctx,dots,r,color){
  ctx.fillStyle=color;
  dots.forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();});
}

function drawLines(ctx,strokes,ox,oy,sc,color,lw){
  ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  strokes.forEach(stroke=>{
    if(stroke.length<2)return;
    ctx.beginPath();
    stroke.forEach(([x,y],i)=>{
      const px=ox+x*sc,py=oy+y*sc;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    });
    ctx.stroke();
  });
}

const _pathCache={};

function normalizePaths(key, strokes) {
  if (!strokes || !strokes.length) return strokes;
  if (typeof strokes[0] !== 'string') return strokes;
  if (_pathCache[key]) return _pathCache[key];

  const result = strokes.map(d => {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', d);
    const len = p.getTotalLength();
    const pts = [];

    // Minimum 2 dots for any path, step based on length
    const step = Math.min(2, len / 2); // was hardcoded 2
    for (let t = 0; t <= len; t += step) {
      const pt = p.getPointAtLength(t);
      pts.push([pt.x, pt.y]);
    }
    return pts;
  });

  return (_pathCache[key] = result);
}

function getStrokesForItem(topic,item){
  if(topic.type==='skeleton') return normalizePaths(item.key, SKELETONS[item.key]);
  const map = topic.label==='Animals' ? ANIMAL_PATHS
          : topic.label==='Fruits'   ? FRUIT_PATHS
          : topic.label==='Foods'   ? FOOD_PATHS
          : topic.label==='Cars'     ? CAR_PATHS
          : topic.label==='Vehicles' ? VEHICLE_PATHS
          : topic.label==='Nature' ? NATURE_PATHS
          : topic.label==='Shapes'   ? SHAPE_PATHS
          : SHAPE_PATHS;
  return normalizePaths(item.key,map[item.key]);
}

function computeTransform(strokes,w,h,padFrac){
  if(!strokes||!strokes.length)return{ox:0,oy:0,sc:1};
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  strokes.forEach(s=>s.forEach(([x,y])=>{
    if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;
  }));
  const pw=maxX-minX,ph=maxY-minY;
  const pad=padFrac!==undefined?padFrac:TEMPLATE_FILL;
  const sc=Math.min(w/pw,h/ph)*pad;
  return{ox:(w-pw*sc)/2-minX*sc,oy:(h-ph*sc)/2-minY*sc,sc,minX,minY,maxX,maxY};
}

function renderSkeletonDots(ctx,key,w,h,dotR,spacing){
  const strokes=normalizePaths(key,SKELETONS[key]);
  if(!strokes)return;
  const{ox,oy,sc}=computeTransform(strokes,w,h);
  strokes.forEach(stroke=>{
    const mapped=stroke.map(([x,y])=>[ox+x*sc,oy+y*sc]);
    drawDots(ctx,samplePolyline(mapped,spacing),dotR,DOT_COLOR);
  });
}

// In renderPolypathDots, change spacing based on total path length
function renderPolypathDots(ctx, strokes, w, h, dotR, spacing) {
  if (!strokes) return;
  const { ox, oy, sc } = computeTransform(strokes, w, h);
  strokes.forEach(stroke => {
    const mapped = stroke.map(([x, y]) => [ox + x * sc, oy + y * sc]);
    const totalLen = mapped.reduce((acc, p, i) =>
      i === 0 ? 0 : acc + Math.hypot(p[0]-mapped[i-1][0], p[1]-mapped[i-1][1]), 0);
    // enforce minimum 8 dots per stroke
    const adjSpacing = Math.min(spacing, totalLen / 8);
    drawDots(ctx, samplePolyline(mapped, adjSpacing), dotR, DOT_COLOR);
  });
}

function renderHintLines(ctx,topic,item,w,h){
  const strokes=getStrokesForItem(topic,item);
  if(!strokes)return;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle=cssVar('--panel-bg')||'#f8f9ff';ctx.fillRect(0,0,w,h);
  const{ox,oy,sc}=computeTransform(strokes,w,h);
  const lw=Math.max(2,Math.min(w,h)*0.025);
  drawLines(ctx,strokes,ox,oy,sc,cssVar('--accent-strong')||'#7c83e8',lw);
}

const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const overlay=document.getElementById('overlay');
const modalGrid=document.getElementById('modal-grid');
const topicTabsEl=document.getElementById('topic-tabs');
const colorTrigger=document.getElementById('color-trigger');
const colorPopup=document.getElementById('color-popup');
const colorGrid=document.getElementById('color-grid');
const popupCloseArea=document.getElementById('popup-close-area');
const hintThumb=document.getElementById('hint-thumb');
const hintSmall=document.getElementById('hint-small-canvas');
const hintOverlay=document.getElementById('hint-overlay');
const hintBig=document.getElementById('hint-big-canvas');
const fullscreenBtn=document.getElementById('fullscreenBtn');

// ── i18n
const I18N={
  en:{
    undo:'Undo',clear:'Clear',hint:'hint',trace:'Trace the dots!',
    chooseTemplate:'Choose a template',settings:'Settings',
    language:'Language',theme:'Theme',light:'Light',dark:'Dark',templateSize:'Template size',
    templateSizeDesc:'How large the template appears',
    login:'Sign in',loginDesc:'Save progress across devices',
    upgrade:'Upgrade',upgradeDesc:'Unlock all templates and themes',
    sectionGeneral:'General',sectionAccount:'Account',sectionAbout:'About',
  },
  vi:{
    undo:'Hoàn tác',clear:'Xóa',hint:'gợi ý',trace:'Tô theo chấm!',
    chooseTemplate:'Chọn mẫu',settings:'Cài đặt',
    language:'Ngôn ngữ',templateSize:'Kích thước mẫu',
    templateSizeDesc:'Mẫu hiển thị lớn cỡ nào',
    login:'Đăng nhập',loginDesc:'Lưu tiến trình trên nhiều thiết bị',
    upgrade:'Nâng cấp',upgradeDesc:'Mở khóa tất cả mẫu và giao diện',
    sectionGeneral:'Chung',sectionAccount:'Tài khoản',sectionAbout:'Giới thiệu',
  }
};
let lang='en';
let theme=localStorage.getItem('babyDrawingTheme')||'light';
function t(k){return(I18N[lang]||I18N.en)[k]||I18N.en[k]||k;}
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(el.tagName==='INPUT'||el.tagName==='BUTTON')el.textContent=t(k);
    else el.textContent=t(k);
  });
  document.getElementById('hint-label').textContent=t('hint');
  document.getElementById('trace-hint').textContent=t('trace');
  document.getElementById('modal-title').textContent=t('chooseTemplate');
  document.getElementById('settings-title').textContent=t('settings');
}
function applyTheme(nextTheme){
  theme=nextTheme==='dark'?'dark':'light';
  root.dataset.theme=theme;
  localStorage.setItem('babyDrawingTheme',theme);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===theme));
  if(tCanvas.width)doRender();
  if(overlay.classList.contains('open'))buildModalGrid(currentTopic);
}

let TEMPLATE_FILL=0.68;

let currentTopic='letters',currentIndex=0;
let color=COLORS[0],brushSize=8;
let isDrawing=false,lastX=0,lastY=0;
let history=[];
let hintTimer;

// build color popup grid
function buildColorGrid(){
  colorGrid.innerHTML='';
  COLORS.forEach(c=>{
    const btn=document.createElement('div');
    btn.className='cpick'+(c===color?' active':'');
    btn.style.background=c;
    btn.addEventListener('click',()=>{
      color=c;
      colorTrigger.style.background=c;
      document.querySelectorAll('.cpick').forEach(b=>b.classList.toggle('active',b.style.background===c||b.style.backgroundColor===c));
      closeColorPopup();
    });
    colorGrid.appendChild(btn);
  });
}

function openColorPopup(){
  buildColorGrid();
  colorPopup.classList.add('open');
  popupCloseArea.classList.add('open');
}
function closeColorPopup(){
  colorPopup.classList.remove('open');
  popupCloseArea.classList.remove('open');
}

colorTrigger.addEventListener('click',()=>{
  colorPopup.classList.contains('open')?closeColorPopup():openColorPopup();
});
popupCloseArea.addEventListener('click',closeColorPopup);

// init color trigger
colorTrigger.style.background=color;

// hint thumb
function updateHint(){
  const topic=TOPICS[currentTopic];
  const item=topic.items[currentIndex];
  renderHintLines(hintSmall.getContext('2d'),topic,item,68,68);
  renderHintLines(hintBig.getContext('2d'),topic,item,500,500);
}

hintThumb.addEventListener('click',()=>hintOverlay.classList.add('open'));
document.getElementById('hint-close').addEventListener('click',()=>hintOverlay.classList.remove('open'));
hintOverlay.addEventListener('click',e=>{if(e.target===hintOverlay)hintOverlay.classList.remove('open');});

// template rendering
function doRender(){
  const w=tCanvas.width,h=tCanvas.height;
  tCtx.clearRect(0,0,w,h);
  tCtx.fillStyle=cssVar('--canvas-bg')||'#f8f9ff';tCtx.fillRect(0,0,w,h);
  const topic=TOPICS[currentTopic];
  const item=topic.items[currentIndex];
  if(topic.type==='skeleton') renderSkeletonDots(tCtx,item.key,w,h,DOT_R,DOT_SPACING);
  else renderPolypathDots(tCtx,getStrokesForItem(topic,item),w,h,DOT_R,DOT_SPACING);
  prevBtn.disabled=currentIndex===0;
  nextBtn.disabled=currentIndex===topic.items.length-1;
  tplLabel.textContent=item.name;
  pickerLabel.textContent=topic.label+' · '+item.name;
  updateHint();
}

function resize(){
  const w=canvasArea.offsetWidth,h=canvasArea.offsetHeight;
  tCanvas.width=dCanvas.width=w;tCanvas.height=dCanvas.height=h;
  doRender();
  if(history.length)dCtx.putImageData(history[history.length-1],0,0);
}

function showTraceHint(){
  traceHint.style.opacity='1';
  clearTimeout(hintTimer);
  hintTimer=setTimeout(()=>traceHint.style.opacity='0',2500);
}

function changeTemplate(topic,index){
  currentTopic=topic;currentIndex=index;
  history=[];dCtx.clearRect(0,0,dCanvas.width,dCanvas.height);
  doRender();showTraceHint();
}

// modal
function buildModalGrid(topic){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.topic===topic));
  modalGrid.innerHTML='';
  const t=TOPICS[topic];
  t.items.forEach((item,i)=>{
    const cell=document.createElement('div');
    cell.className='grid-item'+(topic===currentTopic&&i===currentIndex?' active':'');
    const cvs=document.createElement('canvas');
    cvs.width=cvs.height=60;
    const ctx=cvs.getContext('2d');
    ctx.fillStyle=cssVar('--canvas-bg')||'#f8f9ff';ctx.fillRect(0,0,60,60);
    if(t.type==='skeleton') renderSkeletonDots(ctx,item.key,60,60,2,7);
    else renderPolypathDots(ctx,getStrokesForItem(t,item),60,60,2,7);
    cell.appendChild(cvs);
    const lbl=document.createElement('div');lbl.className='grid-item-label';lbl.textContent=item.name;
    cell.appendChild(lbl);
    cell.addEventListener('click',()=>{changeTemplate(topic,i);closeModal();});
    modalGrid.appendChild(cell);
  });
}

function openModal(){
  topicTabsEl.innerHTML='';
  Object.entries(TOPICS).forEach(([key,val])=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(key===currentTopic?' active':'');
    btn.textContent=val.label;btn.dataset.topic=key;
    btn.addEventListener('click',()=>buildModalGrid(key));
    topicTabsEl.appendChild(btn);
  });
  buildModalGrid(currentTopic);
  overlay.classList.add('open');
  const active=modalGrid.querySelector('.grid-item.active');
  if(active)active.scrollIntoView({block:'center',behavior:'instant'});
}
function closeModal(){overlay.classList.remove('open');}

document.getElementById('picker-btn').addEventListener('click',openModal);
document.getElementById('modal-close').addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});

prevBtn.addEventListener('click',()=>{if(currentIndex>0)changeTemplate(currentTopic,currentIndex-1);});
nextBtn.addEventListener('click',()=>{if(currentIndex<TOPICS[currentTopic].items.length-1)changeTemplate(currentTopic,currentIndex+1);});

// ── Settings
const settingsOverlay=document.getElementById('settings-overlay');
function openSettings(){settingsOverlay.classList.add('open');}
function closeSettings(){settingsOverlay.classList.remove('open');}
document.getElementById('settingsBtn').addEventListener('click',openSettings);
document.getElementById('settings-close').addEventListener('click',closeSettings);
settingsOverlay.addEventListener('click',e=>{if(e.target===settingsOverlay)closeSettings();});

function updateFullscreenButton(){
  document.body.classList.toggle('fullscreen-active',!!document.fullscreenElement);
  fullscreenBtn.textContent=document.fullscreenElement?'×':'⛶';
  fullscreenBtn.title=document.fullscreenElement?'Exit full screen':'Full screen';
}
fullscreenBtn.addEventListener('click',async()=>{
  try{
    if(document.fullscreenElement)await document.exitFullscreen();
    else await document.documentElement.requestFullscreen();
  }catch(err){
    console.warn('Fullscreen unavailable',err);
  }
});
document.addEventListener('fullscreenchange',updateFullscreenButton);

// language toggle
document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    lang=btn.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b===btn));
    applyLang();
  });
});
document.querySelectorAll('.theme-btn').forEach(btn=>{
  btn.addEventListener('click',()=>applyTheme(btn.dataset.theme));
});

// template fill slider
const fillSlider=document.getElementById('fillSlider');
const fillValueEl=document.getElementById('fillValue');
fillSlider.addEventListener('input',()=>{
  TEMPLATE_FILL=fillSlider.value/100;
  fillValueEl.textContent=fillSlider.value+'%';
  doRender();
});

// drawing
function getPos(e){
  const rect=dCanvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{x:src.clientX-rect.left,y:src.clientY-rect.top};
}
function saveHistory(){
  history.push(dCtx.getImageData(0,0,dCanvas.width,dCanvas.height));
  if(history.length>30)history.shift();
}
function startDraw(e){
  e.preventDefault();saveHistory();isDrawing=true;
  const p=getPos(e);lastX=p.x;lastY=p.y;
  dCtx.beginPath();dCtx.arc(lastX,lastY,brushSize/2,0,Math.PI*2);
  dCtx.fillStyle=color;dCtx.fill();
  traceHint.style.opacity='0';
}
function draw(e){
  if(!isDrawing)return;e.preventDefault();
  const p=getPos(e);
  dCtx.beginPath();dCtx.moveTo(lastX,lastY);dCtx.lineTo(p.x,p.y);
  dCtx.strokeStyle=color;dCtx.lineWidth=brushSize;
  dCtx.lineCap='round';dCtx.lineJoin='round';dCtx.stroke();
  lastX=p.x;lastY=p.y;
}
function endDraw(e){if(isDrawing){e.preventDefault();isDrawing=false;}}

dCanvas.addEventListener('mousedown',startDraw);
dCanvas.addEventListener('mousemove',draw);
dCanvas.addEventListener('mouseup',endDraw);
dCanvas.addEventListener('mouseleave',endDraw);
dCanvas.addEventListener('touchstart',startDraw,{passive:false});
dCanvas.addEventListener('touchmove',draw,{passive:false});
dCanvas.addEventListener('touchend',endDraw,{passive:false});

document.querySelectorAll('.brush-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.brush-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');brushSize=parseInt(btn.dataset.size);
  });
});
document.getElementById('undoBtn').addEventListener('click',()=>{
  const snap=history.pop();
  dCtx.clearRect(0,0,dCanvas.width,dCanvas.height);
  if(snap)dCtx.putImageData(snap,0,0);
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  saveHistory();dCtx.clearRect(0,0,dCanvas.width,dCanvas.height);showTraceHint();
});
document.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('resize',resize);
applyTheme(theme);
resize();showTraceHint();
</script>
</body>
</html>

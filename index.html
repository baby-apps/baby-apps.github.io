<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Baby Drawing</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
body{background:#f0f4ff;font-family:'Nunito',sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;}

/* ── TOP BAR ── */
#topbar{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;background:#fff;
  border-bottom:2px solid #e8eaf6;flex-shrink:0;
  height:54px;
}
#picker-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:20px;
  border:2px solid #7c83e8;background:#eef0ff;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:#5c63d8;
  cursor:pointer;white-space:nowrap;flex:1;min-width:0;
  touch-action:manipulation;
}
#picker-btn span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-btn{
  width:40px;height:40px;border-radius:12px;
  border:2px solid #e0e0e0;background:#fafafa;
  font-size:20px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;color:#555;transition:transform 0.1s;
}
.nav-btn:active{transform:scale(0.9);background:#eef0ff;}
.nav-btn:disabled{opacity:0.3;pointer-events:none;}
#tpl-label{font-family:'Fredoka One',cursive;font-size:15px;color:#5c63d8;min-width:52px;text-align:center;flex-shrink:0;}

/* ── CANVAS ── */
#canvas-area{flex:1;position:relative;overflow:hidden;touch-action:none;}
#template-canvas,#draw-canvas{position:absolute;top:0;left:0;}
#template-canvas{pointer-events:none;}
#draw-canvas{cursor:crosshair;touch-action:none;}

/* ── HINT THUMBNAIL ── */
#hint-thumb{
  position:absolute;top:10px;right:10px;
  width:72px;height:72px;border-radius:14px;
  background:#fff;border:2px solid #c5caff;
  overflow:hidden;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.15s;z-index:10;
}
#hint-thumb:active{transform:scale(0.93);}
#hint-thumb canvas{width:100%;height:100%;}
#hint-label{position:absolute;bottom:0;left:0;right:0;background:rgba(92,99,216,0.82);color:#fff;font-size:9px;font-weight:800;text-align:center;padding:2px 0;border-radius:0 0 12px 12px;}

/* ── HINT OVERLAY ── */
#hint-overlay{
  position:absolute;inset:0;background:rgba(30,30,60,0.55);
  display:flex;align-items:center;justify-content:center;
  z-index:20;opacity:0;pointer-events:none;transition:opacity 0.2s;
}
#hint-overlay.open{opacity:1;pointer-events:all;}
#hint-big{
  width:min(80vw,80vh);height:min(80vw,80vh);
  background:#fff;border-radius:20px;border:3px solid #c5caff;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  transform:scale(0.9);transition:transform 0.2s;
}
#hint-overlay.open #hint-big{transform:scale(1);}
#hint-big canvas{width:100%;height:100%;}
#hint-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;}

/* ── TRACE HINT ── */
#trace-hint{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.92);border-radius:20px;
  padding:6px 16px;font-size:12px;font-weight:700;color:#aaa;
  pointer-events:none;transition:opacity 0.5s;white-space:nowrap;
}

/* ── BOTTOM BAR ── */
#bottombar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:#fff;
  border-top:2px solid #e8eaf6;flex-shrink:0;
  height:64px;gap:10px;
}

/* current color dot (opens picker) */
#color-trigger{
  width:38px;height:38px;border-radius:50%;
  border:3px solid #333;cursor:pointer;flex-shrink:0;
  transition:transform 0.1s;touch-action:manipulation;
  position:relative;
}
#color-trigger:active{transform:scale(0.9);}

/* brush size row */
.brush-btn{
  width:36px;height:36px;border-radius:10px;
  border:2px solid #e0e0e0;background:#fafafa;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform 0.1s;touch-action:manipulation;
}
.brush-btn:active{transform:scale(0.9);}
.brush-btn.active{background:#eef0ff;border-color:#7c83e8;}

.action-btn{
  padding:8px 14px;border-radius:14px;
  border:2px solid #e0e0e0;background:#fafafa;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;color:#555;
  cursor:pointer;flex-shrink:0;white-space:nowrap;
  touch-action:manipulation;transition:transform 0.1s;
}
.action-btn:active{transform:scale(0.93);}
.action-btn.danger{color:#e53935;border-color:#ffcdd2;}
.action-btn.danger:active{background:#ffebee;}

/* ── COLOR POPUP ── */
#color-popup{
  position:absolute;bottom:74px;left:12px;
  background:#fff;border-radius:18px;
  border:2px solid #e8eaf6;
  padding:12px;z-index:30;
  display:none;
  box-shadow:0 4px 24px rgba(92,99,216,0.18);
}
#color-popup.open{display:block;}
#color-grid{display:grid;grid-template-columns:repeat(6,36px);gap:8px;}
.cpick{
  width:36px;height:36px;border-radius:50%;
  border:3px solid transparent;cursor:pointer;
  transition:transform 0.1s;touch-action:manipulation;
}
.cpick:active{transform:scale(0.88);}
.cpick.active{border-color:#333;transform:scale(1.15);}
#popup-close-area{position:fixed;inset:0;z-index:29;display:none;}
#popup-close-area.open{display:block;}

/* ── MODAL ── */
#overlay{position:fixed;inset:0;background:rgba(60,60,100,0.45);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.2s;}
#overlay.open{opacity:1;pointer-events:all;}
#modal{background:#fff;border-radius:24px;width:min(94vw,520px);max-height:82vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(0.94);transition:transform 0.2s;}
#overlay.open #modal{transform:scale(1);}
#modal-header{padding:14px 16px 0;display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
#modal-title{font-family:'Fredoka One',cursive;font-size:18px;color:#5c63d8;}
#topic-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.tab-btn{padding:5px 12px;border-radius:16px;border:2px solid #e0e0e0;background:#fafafa;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;color:#777;cursor:pointer;touch-action:manipulation;}
.tab-btn.active{background:#eef0ff;border-color:#7c83e8;color:#5c63d8;}
#modal-grid-wrap{flex:1;overflow-y:auto;padding:12px 16px 16px;}
#modal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:10px;}
.grid-item{aspect-ratio:1;border-radius:14px;border:2px solid #e8eaf6;background:#f8f9ff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;touch-action:manipulation;transition:transform 0.1s;}
.grid-item:active{transform:scale(0.92);}
.grid-item.active{border-color:#7c83e8;background:#eef0ff;}
.grid-item canvas{pointer-events:none;}
.grid-item-label{font-size:11px;font-weight:800;color:#aaa;font-family:'Nunito',sans-serif;text-align:center;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <button id="picker-btn"><span id="picker-label">ABC · A</span> ▾</button>
  <button class="nav-btn" id="prevBtn">←</button>
  <span id="tpl-label">A</span>
  <button class="nav-btn" id="nextBtn">→</button>
</div>

<!-- CANVAS -->
<div id="canvas-area">
  <canvas id="template-canvas"></canvas>
  <canvas id="draw-canvas"></canvas>

  <!-- hint thumbnail -->
  <div id="hint-thumb">
    <canvas id="hint-small-canvas" width="68" height="68"></canvas>
    <div id="hint-label">hint</div>
  </div>

  <!-- hint overlay -->
  <div id="hint-overlay">
    <div id="hint-big">
      <canvas id="hint-big-canvas" width="500" height="500"></canvas>
    </div>
    <button id="hint-close">×</button>
  </div>

  <div id="trace-hint">Trace the dots!</div>
</div>

<!-- COLOR POPUP -->
<div id="popup-close-area"></div>
<div id="color-popup">
  <div id="color-grid"></div>
</div>

<!-- BOTTOM BAR -->
<div id="bottombar">
  <div id="color-trigger"></div>

  <button class="brush-btn active" data-size="8"><svg width="14" height="14"><circle cx="7" cy="7" r="4" fill="#555"/></svg></button>
  <button class="brush-btn" data-size="18"><svg width="20" height="20"><circle cx="10" cy="10" r="7" fill="#555"/></svg></button>
  <button class="brush-btn" data-size="30"><svg width="26" height="26"><circle cx="13" cy="13" r="11" fill="#555"/></svg></button>

  <button class="action-btn" id="undoBtn">Undo</button>
  <button class="action-btn danger" id="clearBtn">Clear</button>
</div>

<!-- MODAL -->
<div id="overlay">
  <div id="modal">
    <div id="modal-header">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span id="modal-title">Choose a template</span>
        <button id="modal-close" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;padding:0 4px;">×</button>
      </div>
      <div id="topic-tabs"></div>
    </div>
    <div id="modal-grid-wrap"><div id="modal-grid"></div></div>
  </div>
</div>

    const dx=bx-ax,dy=by-ay,seg=Math.hypot(dx,dy);
    if(seg<0.001)continue;
    let t=(carry>0)?(spacing-carry)/seg:0;
    if(carry===0)dots.push([ax,ay]);
    while(t<=1){dots.push([ax+dx*t,ay+dy*t]);t+=spacing/seg;}
    carry=seg-(t-spacing/seg)*seg;
    if(carry>=seg)carry=0;
  }
  return dots;
}

function drawDots(ctx,dots,r,color){
  ctx.fillStyle=color;
  dots.forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();});
}

function drawLines(ctx,strokes,ox,oy,sc,color,lw){
  ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  strokes.forEach(stroke=>{
    if(stroke.length<2)return;
    ctx.beginPath();
    stroke.forEach(([x,y],i)=>{
      const px=ox+x*sc,py=oy+y*sc;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    });
    ctx.stroke();
  });
}

function getStrokesForItem(topic,item){
  if(topic.type==='skeleton') return SKELETONS[item.key];
  const map=topic.label==='Animals'?ANIMAL_PATHS:topic.label==='Fruits'?FRUIT_PATHS:CAR_PATHS;
  return map[item.key];
}

function computeTransform(strokes,w,h,padFrac){
  if(!strokes||!strokes.length)return{ox:0,oy:0,sc:1};
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  strokes.forEach(s=>s.forEach(([x,y])=>{
    if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;
  }));
  const pw=maxX-minX,ph=maxY-minY;
  const pad=padFrac||0.82;
  const sc=Math.min(w/pw,h/ph)*pad;
  return{ox:(w-pw*sc)/2-minX*sc,oy:(h-ph*sc)/2-minY*sc,sc,minX,minY,maxX,maxY};
}

function renderSkeletonDots(ctx,key,w,h,dotR,spacing){
  const strokes=SKELETONS[key];if(!strokes)return;
  const scale=Math.min(w,h)*0.0082;
  const ox=w*0.5-50*scale,oy=h*0.5-50*scale;
  strokes.forEach(stroke=>{
    const mapped=stroke.map(([x,y])=>[ox+x*scale,oy+y*scale]);
    drawDots(ctx,samplePolyline(mapped,spacing),dotR,DOT_COLOR);
  });
}

function renderPolypathDots(ctx,strokes,w,h,dotR,spacing){
  if(!strokes)return;
  const{ox,oy,sc}=computeTransform(strokes,w,h);
  strokes.forEach(stroke=>{
    const mapped=stroke.map(([x,y])=>[ox+x*sc,oy+y*sc]);
    drawDots(ctx,samplePolyline(mapped,spacing),dotR,DOT_COLOR);
  });
}

function renderHintLines(ctx,topic,item,w,h){
  const strokes=getStrokesForItem(topic,item);
  if(!strokes)return;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
  let ox,oy,sc;
  if(topic.type==='skeleton'){
    sc=Math.min(w,h)*0.0082;ox=w*0.5-50*sc;oy=h*0.5-50*sc;
  } else {
    const t=computeTransform(strokes,w,h,0.8);ox=t.ox;oy=t.oy;sc=t.sc;
  }
  const lw=Math.max(2,Math.min(w,h)*0.025);
  drawLines(ctx,strokes,ox,oy,sc,'#7c83e8',lw);
}

// ── DOM refs
const tCanvas=document.getElementById('template-canvas');
const dCanvas=document.getElementById('draw-canvas');
const tCtx=tCanvas.getContext('2d');
const dCtx=dCanvas.getContext('2d');
const canvasArea=document.getElementById('canvas-area');
const traceHint=document.getElementById('trace-hint');
const tplLabel=document.getElementById('tpl-label');
const pickerLabel=document.getElementById('picker-label');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const overlay=document.getElementById('overlay');
const modalGrid=document.getElementById('modal-grid');
const topicTabsEl=document.getElementById('topic-tabs');
const colorTrigger=document.getElementById('color-trigger');
const colorPopup=document.getElementById('color-popup');
const colorGrid=document.getElementById('color-grid');
const popupCloseArea=document.getElementById('popup-close-area');
const hintThumb=document.getElementById('hint-thumb');
const hintSmall=document.getElementById('hint-small-canvas');
const hintOverlay=document.getElementById('hint-overlay');
const hintBig=document.getElementById('hint-big-canvas');

let currentTopic='letters',currentIndex=0;
let color=COLORS[0],brushSize=8;
let isDrawing=false,lastX=0,lastY=0;
let history=[];
let hintTimer;

// build color popup grid
function buildColorGrid(){
  colorGrid.innerHTML='';
  COLORS.forEach(c=>{
    const btn=document.createElement('div');
    btn.className='cpick'+(c===color?' active':'');
    btn.style.background=c;
    if(c==='#ffffff')btn.style.border='3px solid #ccc';
    btn.addEventListener('click',()=>{
      color=c;
      colorTrigger.style.background=c;
      document.querySelectorAll('.cpick').forEach(b=>b.classList.toggle('active',b.style.background===c||b.style.backgroundColor===c));
      closeColorPopup();
    });
    colorGrid.appendChild(btn);
  });
}

function openColorPopup(){
  buildColorGrid();
  colorPopup.classList.add('open');
  popupCloseArea.classList.add('open');
}
function closeColorPopup(){
  colorPopup.classList.remove('open');
  popupCloseArea.classList.remove('open');
}

colorTrigger.addEventListener('click',()=>{
  colorPopup.classList.contains('open')?closeColorPopup():openColorPopup();
});
popupCloseArea.addEventListener('click',closeColorPopup);

// init color trigger
colorTrigger.style.background=color;

// hint thumb
function updateHint(){
  const topic=TOPICS[currentTopic];
  const item=topic.items[currentIndex];
  renderHintLines(hintSmall.getContext('2d'),topic,item,68,68);
  renderHintLines(hintBig.getContext('2d'),topic,item,500,500);
}

hintThumb.addEventListener('click',()=>hintOverlay.classList.add('open'));
document.getElementById('hint-close').addEventListener('click',()=>hintOverlay.classList.remove('open'));
hintOverlay.addEventListener('click',e=>{if(e.target===hintOverlay)hintOverlay.classList.remove('open');});

// template rendering
function doRender(){
  const w=tCanvas.width,h=tCanvas.height;
  tCtx.clearRect(0,0,w,h);
  tCtx.fillStyle='#f8f9ff';tCtx.fillRect(0,0,w,h);
  const topic=TOPICS[currentTopic];
  const item=topic.items[currentIndex];
  if(topic.type==='skeleton') renderSkeletonDots(tCtx,item.key,w,h,DOT_R,DOT_SPACING);
  else renderPolypathDots(tCtx,getStrokesForItem(topic,item),w,h,DOT_R,DOT_SPACING);
  prevBtn.disabled=currentIndex===0;
  nextBtn.disabled=currentIndex===topic.items.length-1;
  tplLabel.textContent=item.name;
  pickerLabel.textContent=topic.label+' · '+item.name;
  updateHint();
}

function resize(){
  const w=canvasArea.offsetWidth,h=canvasArea.offsetHeight;
  tCanvas.width=dCanvas.width=w;tCanvas.height=dCanvas.height=h;
  doRender();
  if(history.length)dCtx.putImageData(history[history.length-1],0,0);
}

function showTraceHint(){
  traceHint.style.opacity='1';
  clearTimeout(hintTimer);
  hintTimer=setTimeout(()=>traceHint.style.opacity='0',2500);
}

function changeTemplate(topic,index){
  currentTopic=topic;currentIndex=index;
  history=[];dCtx.clearRect(0,0,dCanvas.width,dCanvas.height);
  doRender();showTraceHint();
}

// modal
function buildModalGrid(topic){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.topic===topic));
  modalGrid.innerHTML='';
  const t=TOPICS[topic];
  t.items.forEach((item,i)=>{
    const cell=document.createElement('div');
    cell.className='grid-item'+(topic===currentTopic&&i===currentIndex?' active':'');
    const cvs=document.createElement('canvas');
    cvs.width=cvs.height=60;
    const ctx=cvs.getContext('2d');
    ctx.fillStyle='#f8f9ff';ctx.fillRect(0,0,60,60);
    if(t.type==='skeleton') renderSkeletonDots(ctx,item.key,60,60,2,7);
    else renderPolypathDots(ctx,getStrokesForItem(t,item),60,60,2,7);
    cell.appendChild(cvs);
    const lbl=document.createElement('div');lbl.className='grid-item-label';lbl.textContent=item.name;
    cell.appendChild(lbl);
    cell.addEventListener('click',()=>{changeTemplate(topic,i);closeModal();});
    modalGrid.appendChild(cell);
  });
}

function openModal(){
  topicTabsEl.innerHTML='';
  Object.entries(TOPICS).forEach(([key,val])=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(key===currentTopic?' active':'');
    btn.textContent=val.label;btn.dataset.topic=key;
    btn.addEventListener('click',()=>buildModalGrid(key));
    topicTabsEl.appendChild(btn);
  });
  buildModalGrid(currentTopic);
  overlay.classList.add('open');
  const active=modalGrid.querySelector('.grid-item.active');
  if(active)active.scrollIntoView({block:'center',behavior:'instant'});
}
function closeModal(){overlay.classList.remove('open');}

document.getElementById('picker-btn').addEventListener('click',openModal);
document.getElementById('modal-close').addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});

prevBtn.addEventListener('click',()=>{if(currentIndex>0)changeTemplate(currentTopic,currentIndex-1);});
nextBtn.addEventListener('click',()=>{if(currentIndex<TOPICS[currentTopic].items.length-1)changeTemplate(currentTopic,currentIndex+1);});

// drawing
function getPos(e){
  const rect=dCanvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{x:src.clientX-rect.left,y:src.clientY-rect.top};
}
function saveHistory(){
  history.push(dCtx.getImageData(0,0,dCanvas.width,dCanvas.height));
  if(history.length>30)history.shift();
}
function startDraw(e){
  e.preventDefault();saveHistory();isDrawing=true;
  const p=getPos(e);lastX=p.x;lastY=p.y;
  dCtx.beginPath();dCtx.arc(lastX,lastY,brushSize/2,0,Math.PI*2);
  dCtx.fillStyle=color;dCtx.fill();
  traceHint.style.opacity='0';
}
function draw(e){
  if(!isDrawing)return;e.preventDefault();
  const p=getPos(e);
  dCtx.beginPath();dCtx.moveTo(lastX,lastY);dCtx.lineTo(p.x,p.y);
  dCtx.strokeStyle=color;dCtx.lineWidth=brushSize;
  dCtx.lineCap='round';dCtx.lineJoin='round';dCtx.stroke();
  lastX=p.x;lastY=p.y;
}
function endDraw(e){if(isDrawing){e.preventDefault();isDrawing=false;}}

dCanvas.addEventListener('mousedown',startDraw);
dCanvas.addEventListener('mousemove',draw);
dCanvas.addEventListener('mouseup',endDraw);
dCanvas.addEventListener('mouseleave',endDraw);
dCanvas.addEventListener('touchstart',startDraw,{passive:false});
dCanvas.addEventListener('touchmove',draw,{passive:false});
dCanvas.addEventListener('touchend',endDraw,{passive:false});

document.querySelectorAll('.brush-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.brush-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');brushSize=parseInt(btn.dataset.size);
  });
});
document.getElementById('undoBtn').addEventListener('click',()=>{
  history.pop();dCtx.clearRect(0,0,dCanvas.width,dCanvas.height);
  if(history.length)dCtx.putImageData(history[history.length-1],0,0);
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  saveHistory();dCtx.clearRect(0,0,dCanvas.width,dCanvas.height);showTraceHint();
});
document.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('resize',resize);
resize();showTraceHint();
</script>
</body>
</html>

<title>SVG → Template JSON</title>
<style>
  :root {
    --bg:       #0d0f16;
    --surface:  #151720;
    --border:   #252838;
    --accent:   #7c6ff7;
    --accent-dim: rgba(124,111,247,0.12);
    --text:     #d4d8f0;
    --muted:    #5c6080;
    --good:     #4ade80;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
    --sans: system-ui, -apple-system, sans-serif;
    --dot-color: #7c6ff7;
    --canvas-bg: #1e2130;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:      #f2f3f8;
      --surface: #ffffff;
      --border:  #dde0ef;
      --text:    #1a1c2e;
      --muted:   #8890b0;
      --accent-dim: rgba(124,111,247,0.08);
      --dot-color: #7c6ff7;
      --canvas-bg: #f0f1f8;
    }
  }
  :root[data-theme="dark"]  { --bg:#0d0f16;--surface:#151720;--border:#252838;--text:#d4d8f0;--muted:#5c6080;--accent-dim:rgba(124,111,247,0.12);--dot-color:#7c6ff7;--canvas-bg:#1e2130; }
  :root[data-theme="light"] { --bg:#f2f3f8;--surface:#ffffff;--border:#dde0ef;--text:#1a1c2e;--muted:#8890b0;--accent-dim:rgba(124,111,247,0.08);--dot-color:#7c6ff7;--canvas-bg:#f0f1f8; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    gap: 0;
  }

  header {
    width: 100%;
    max-width: 920px;
    margin-bottom: 32px;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  h1 {
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    letter-spacing: -.02em;
    color: var(--text);
    line-height: 1.2;
  }
  h1 span { color: var(--muted); font-weight: 400; }

  .grid {
    width: 100%;
    max-width: 920px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .panel-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 6px;
    padding: 2px 8px;
  }

  textarea {
    flex: 1;
    min-height: 360px;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    padding: 14px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
    tab-size: 2;
  }
  textarea::placeholder { color: var(--muted); }

  /* preview panel */
  .preview-panel {
    width: 100%;
    max-width: 920px;
    margin-top: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .preview-body {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 24px;
    flex-wrap: wrap;
  }
  .preview-canvas-wrap {
    position: relative;
    flex-shrink: 0;
  }
  #previewCanvas {
    display: block;
    border-radius: 10px;
    background: var(--canvas-bg);
    border: 1px solid var(--border);
  }
  .preview-info {
    flex: 1;
    min-width: 180px;
  }
  .preview-info h3 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    word-break: break-all;
  }
  .preview-stat {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .preview-stat b { color: var(--accent); font-variant-numeric: tabular-nums; }
  .preview-empty {
    width: 100%;
    text-align: center;
    padding: 32px 14px;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }
  .preview-error {
    font-size: 12px;
    color: #f87171;
    margin-top: 8px;
    font-family: var(--mono);
  }

  .actions {
    width: 100%;
    max-width: 920px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }

  .name-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 12px;
  }
  .name-wrap label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  #tplName {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    padding: 10px 0;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { opacity: .88; }
  .btn-copy {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--border);
  }
  .btn-copy:hover { opacity: .8; }
  .btn-copy.copied {
    background: rgba(74,222,128,.12);
    color: var(--good);
    border-color: transparent;
  }

  .info-bar {
    width: 100%;
    max-width: 920px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
  }
  .info-bar b { color: var(--accent); }
</style>

<header>
  <div class="eyebrow">Dev Tool</div>
  <h1>SVG → Template JSON <span>paste · extract · preview · copy</span></h1>
</header>

<div class="grid">
  <div class="panel">
    <div class="panel-head">
      <span class="panel-label">SVG Input</span>
      <span class="badge" id="pathCount">0 paths</span>
    </div>
    <textarea id="svgInput" placeholder="Paste SVG here…" spellcheck="false"></textarea>
  </div>
  <div class="panel">
    <div class="panel-head">
      <span class="panel-label">JSON Output</span>
      <button class="btn btn-copy" id="copyBtn" onclick="copyOutput()">Copy</button>
    </div>
    <textarea id="output" placeholder="Output appears here… (editable)" spellcheck="false"></textarea>
  </div>
</div>

<div class="actions">
  <div class="name-wrap">
    <label for="tplName">Name</label>
    <input id="tplName" type="text" value="MyTemplate" spellcheck="false">
  </div>
  <button class="btn btn-primary" onclick="convert()">Convert</button>
</div>

<div class="info-bar" id="infoBar"></div>

<!-- Preview panel -->
<div class="preview-panel" id="previewPanel">
  <div class="panel-head">
    <span class="panel-label">Preview</span>
    <span class="badge" id="previewBadge">—</span>
  </div>
  <div class="preview-body" id="previewBody">
    <div class="preview-empty">Convert an SVG or edit the JSON output to see the template preview.</div>
  </div>
</div>

<script>
const svgInput  = document.getElementById('svgInput');
const output    = document.getElementById('output');
const pathCount = document.getElementById('pathCount');
const infoBar   = document.getElementById('infoBar');

let _convertTimer;
function scheduleConvert() {
  clearTimeout(_convertTimer);
  _convertTimer = setTimeout(convert, 120);
}

svgInput.addEventListener('input', scheduleConvert);
document.getElementById('tplName').addEventListener('input', scheduleConvert);
output.addEventListener('input', () => updatePreview());

// ── Extract SVG paths

function extractPaths(svgText) {
  if (!svgText.trim()) return [];
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgText, 'image/svg+xml');
    if (doc.querySelector('parsererror')) return [];
    return Array.from(doc.querySelectorAll('path'))
      .map(p => p.getAttribute('d'))
      .filter(Boolean)
      .filter(d => !/^M\s*0\s+0\s*[hH]\s*\d+/.test(d.trim()));
  } catch { return []; }
}

// ── Convert

function convert() {
  const raw = svgInput.value.trim();
  if (!raw) { setOutput(''); return; }

  const paths = extractPaths(raw);
  if (!paths.length) { setOutput(''); infoBar.textContent = 'No <path> elements found.'; return; }

  const name  = document.getElementById('tplName').value.trim() || 'MyTemplate';
  const lines = paths.map((d, i) => '    ' + JSON.stringify(d) + (i < paths.length - 1 ? ',' : ''));
  const json  = '"' + name + '": [\n' + lines.join('\n') + '\n  ]';

  setOutput(json);
  pathCount.textContent = paths.length + (paths.length === 1 ? ' path' : ' paths');
  infoBar.innerHTML = 'Found <b>' + paths.length + '</b> path' + (paths.length !== 1 ? 's' : '') + '. Edit the JSON or copy it into your template data.';
  updatePreview();
}

function setOutput(text) {
  output.value = text;
}

function copyOutput() {
  const text = output.value.trim();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  });
}

// ── Rendering engine (matches index.html)

function samplePolyline(pts, spacing) {
  const dots = []; let carry = 0;
  for (let i = 0; i < pts.length - 1; i++) {
    const ax=pts[i][0], ay=pts[i][1], bx=pts[i+1][0], by=pts[i+1][1];
    const dx=bx-ax, dy=by-ay, seg=Math.hypot(dx,dy);
    if (seg < 0.001) continue;
    let t = carry > 0 ? (spacing - carry) / seg : 0;
    if (carry === 0) dots.push([ax, ay]);
    while (t <= 1) { dots.push([ax+dx*t, ay+dy*t]); t += spacing/seg; }
    carry = seg - (t - spacing/seg) * seg;
    if (carry >= seg) carry = 0;
  }
  return dots;
}

function drawDots(ctx, dots, r, color) {
  ctx.fillStyle = color;
  dots.forEach(([x,y]) => { ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); });
}

function computeTransform(strokes, w, h, padFrac) {
  if (!strokes || !strokes.length) return {ox:0,oy:0,sc:1};
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  strokes.forEach(s => s.forEach(([x,y]) => {
    if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y;
  }));
  const pw=maxX-minX, ph=maxY-minY;
  const sc = Math.min(w/(pw||1), h/(ph||1)) * (padFrac||0.82);
  return {ox:(w-pw*sc)/2-minX*sc, oy:(h-ph*sc)/2-minY*sc, sc};
}

const _cache = {};
function normalizePaths(strokes) {
  if (!strokes || !strokes.length) return strokes;
  if (typeof strokes[0] !== 'string') return strokes;
  const key = strokes[0].slice(0, 40);
  if (_cache[key]) return _cache[key];
  const result = strokes.map(d => {
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', d);
    const len = p.getTotalLength(), pts = [];
    const step = Math.max(1, len / 300); // ~300 pts per stroke max
    for (let t = 0; t <= len; t += step) { const pt = p.getPointAtLength(t); pts.push([pt.x, pt.y]); }
    return pts;
  });
  return (_cache[key] = result);
}

function renderDots(ctx, strokes, w, h) {
  const normalized = normalizePaths(strokes);
  if (!normalized) return;
  const {ox, oy, sc} = computeTransform(normalized, w, h, 0.82);
  const dotR    = Math.max(2, w * 0.012);
  const spacing = Math.max(6, w * 0.038);
  const color   = getComputedStyle(document.documentElement).getPropertyValue('--dot-color').trim() || '#7c6ff7';
  normalized.forEach(stroke => {
    const mapped = stroke.map(([x,y]) => [ox+x*sc, oy+y*sc]);
    drawDots(ctx, samplePolyline(mapped, spacing), dotR, color);
  });
}

// ── Parse JSON output and update preview

function parseOutput(text) {
  text = text.trim();
  if (!text) return null;
  try {
    // Wrap in {} to make it parseable: "Name": [...]  →  {"Name": [...]}
    const parsed = JSON.parse('{' + text + '}');
    const keys = Object.keys(parsed);
    if (!keys.length) return null;
    return { name: keys[0], strokes: parsed[keys[0]] };
  } catch (e) {
    return { error: e.message };
  }
}

function updatePreview() {
  const body  = document.getElementById('previewBody');
  const badge = document.getElementById('previewBadge');
  const text  = output.value.trim();

  if (!text) {
    badge.textContent = '—';
    body.innerHTML = '<div class="preview-empty">Convert an SVG or edit the JSON output to see the template preview.</div>';
    return;
  }

  const result = parseOutput(text);

  if (!result || result.error) {
    badge.textContent = 'invalid JSON';
    body.innerHTML = '<div class="preview-empty">Invalid JSON.<div class="preview-error">' + (result ? escHtml(result.error) : '') + '</div></div>';
    return;
  }

  const {name, strokes} = result;
  if (!Array.isArray(strokes) || !strokes.length) {
    badge.textContent = 'no strokes';
    body.innerHTML = '<div class="preview-empty">No stroke data found in JSON.</div>';
    return;
  }

  // Count strokes and total points
  const normalized = normalizePaths(strokes);
  const strokeCount = normalized.length;
  const ptCount = normalized.reduce((n, s) => n + s.length, 0);
  badge.textContent = strokeCount + (strokeCount === 1 ? ' stroke' : ' strokes');

  // Build preview DOM
  const SIZE = 260;
  body.innerHTML = `
    <div class="preview-canvas-wrap">
      <canvas id="previewCanvas" width="${SIZE}" height="${SIZE}"></canvas>
    </div>
    <div class="preview-info">
      <h3 id="previewName">${escHtml(name)}</h3>
      <div class="preview-stat">Strokes: <b>${strokeCount}</b></div>
      <div class="preview-stat">Sample pts: <b>${ptCount}</b></div>
      <div class="preview-stat" id="ptNote" style="color:var(--muted);font-size:11px;margin-top:8px;">
        ${typeof strokes[0]==='string' ? 'SVG path strings — sampled at render time' : 'Coordinate arrays'}
      </div>
    </div>`;

  const canvas = document.getElementById('previewCanvas');
  const ctx    = canvas.getContext('2d');

  // Background
  const bg = getComputedStyle(document.documentElement).getPropertyValue('--canvas-bg').trim() || '#1e2130';
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, SIZE, SIZE);

  renderDots(ctx, strokes, SIZE, SIZE);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
